# Render Blueprint for WCS Judging Application
# This file defines the infrastructure for deployment
# Place this in the root of your repository

services:
  # Django Web Service
  - type: web
    name: wcs-judging
    runtime: python
    plan: free
    rootDir: wcs_judging
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn wcs_judging.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wcs-judging-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.11
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: NODE_VERSION
        value: 20

# PostgreSQL Database
databases:
  - name: wcs-judging-db
    plan: free
    databaseName: wcs_judging
    user: wcs_judging_user